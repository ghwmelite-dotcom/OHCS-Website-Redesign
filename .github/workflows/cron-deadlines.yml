name: Daily deadline processing

on:
  schedule:
    - cron: '15 2 * * *'
  workflow_dispatch: {}

jobs:
  run-deadlines:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: POST /api/system/run-deadlines
        env:
          SYSTEM_CRON_SECRET: ${{ secrets.SYSTEM_CRON_SECRET }}
          ENDPOINT: ${{ vars.DEADLINES_ENDPOINT || 'https://ohcs.pages.dev/api/system/run-deadlines' }}
        run: |
          set -euo pipefail
          if [ -z "${SYSTEM_CRON_SECRET}" ]; then
            echo "SYSTEM_CRON_SECRET secret is not set" >&2
            exit 1
          fi
          response=$(curl --silent --show-error --fail-with-body \
            --max-time 60 \
            --request POST \
            --header "Authorization: Bearer ${SYSTEM_CRON_SECRET}" \
            --header "Content-Type: application/json" \
            --write-out "\nHTTP_STATUS:%{http_code}" \
            "${ENDPOINT}")
          echo "${response}"
