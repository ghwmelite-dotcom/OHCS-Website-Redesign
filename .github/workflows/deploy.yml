name: Deploy to Cloudflare Pages

on:
  push:
    branches: [master]
  workflow_dispatch: {}

# Only one deploy at a time — if a new commit lands while one is running,
# cancel the in-flight run and start the new one. Prevents racing deploys.
concurrency:
  group: cf-pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Build, test, deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ohcs-website/package-lock.json

      - name: Install dependencies
        working-directory: ohcs-website
        # --legacy-peer-deps required: @cloudflare/next-on-pages declares
        # peer compat up to Next 15.5.2, but the project is on Next 16.2.4.
        # The dep itself isn't used at deploy time (we use plain `next build`
        # + `wrangler pages deploy out`), but it's in package.json so npm ci
        # fails strict resolution without the flag.
        run: npm ci --legacy-peer-deps

      - name: Run tests (gate)
        working-directory: ohcs-website
        run: npm test -- --run

      - name: Type check
        working-directory: ohcs-website
        run: npx tsc --noEmit

      - name: Build for Cloudflare Pages
        working-directory: ohcs-website
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: f4f236a6cd8fbddf397c6e9de17d8113
          workingDirectory: ohcs-website
          wranglerVersion: '3.114.17'
          command: pages deploy out --project-name=ohcs --branch=master --commit-dirty=true
