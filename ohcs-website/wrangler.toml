# Cloudflare Pages project configuration
name = "ohcs"
pages_build_output_dir = ".vercel/output/static"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# ──────────────────────────────────────────────────────────────────────
# Production (default) environment
# ──────────────────────────────────────────────────────────────────────

# D1 database (relational data)
[[d1_databases]]
binding = "DB"
database_name = "ohcs-recruitment"
database_id = "f2683715-2426-43d9-bb7c-885d9e64648d"

# R2 bucket (uploaded files)
[[r2_buckets]]
binding = "UPLOADS"
bucket_name = "ohcs-recruitment-uploads"

# Workers AI binding (document sanity checks)
[ai]
binding = "AI"

# Non-secret env vars
#
# ─── EMAIL CONFIG (TEMPORARY) ───────────────────────────────────────
# Sender is currently the Resend sandbox `onboarding@resend.dev`.
# EMAIL_PROVIDER='resend' forces sendEmail() to skip MailChannels
# entirely (MailChannels can't accept mail from a domain we don't own
# DNS for). When OHCS infra adds the Domain Lockdown + SPF records on
# ohcs.gov.gh, swap EMAIL_FROM to noreply@ohcs.gov.gh and set
# EMAIL_PROVIDER='auto' (or remove it). See docs/email-setup.md.
# RESEND_API_KEY is set as a secret via:
#   npx wrangler pages secret put RESEND_API_KEY --project-name=ohcs
# ────────────────────────────────────────────────────────────────────
[vars]
APP_NAME = "OHCS Recruitment"
APP_ENV = "production"
EMAIL_FROM = "onboarding@resend.dev"
EMAIL_FROM_NAME = "OHCS Recruitment (Test)"
EMAIL_PROVIDER = "resend"

# ──────────────────────────────────────────────────────────────────────
# Preview environment (Cloudflare Pages preview deployments)
#
# Preview shares the same D1/R2/AI resources as production in v1 —
# simpler and sufficient for now. Split into separate preview resources
# later if real-world preview usage starts generating conflicting data.
# ──────────────────────────────────────────────────────────────────────
[env.preview]

[[env.preview.d1_databases]]
binding = "DB"
database_name = "ohcs-recruitment"
database_id = "f2683715-2426-43d9-bb7c-885d9e64648d"

[[env.preview.r2_buckets]]
binding = "UPLOADS"
bucket_name = "ohcs-recruitment-uploads"

[env.preview.ai]
binding = "AI"

[env.preview.vars]
APP_NAME = "OHCS Recruitment (Preview)"
APP_ENV = "preview"
EMAIL_FROM = "onboarding@resend.dev"
EMAIL_FROM_NAME = "OHCS Recruitment (Preview)"
EMAIL_PROVIDER = "resend"
